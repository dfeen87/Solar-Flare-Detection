name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint / Import Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import check
        run: |
          python -c "import shared.math_utils; import shared.data_loader; import shared.plot_utils; print('All imports OK')"

# Detailed test suites are in the companion workflows:
#   python-tests.yml  — pytest across Python 3.10 / 3.11 / 3.12
#   julia-tests.yml   — Julia tests across Julia 1.10 / 1 (latest stable)
